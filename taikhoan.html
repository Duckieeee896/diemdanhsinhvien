<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hồ sơ của tôi - Hệ thống</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="dashboard-bg-alt">
    <div id="navbar-placeholder" style="width: 100%;"></div>
    
    <div class="dashboard animate-fade-in-up" style="max-width: 600px; margin: 50px auto;">
        <header style="justify-content: center;">
            <h2>Thông tin tài khoản</h2>
        </header>
        
        <div class="main-content">
            <form id="profile-form">
                <div class="input-group">
                    <label>Email (Tên đăng nhập)</label>
                    <input type="email" id="profile-email" disabled style="background: #f1f2f6; cursor: not-allowed; color: #7f8c8d;">
                </div>
                
                <div class="input-group">
                    <label>Họ và Tên</label>
                    <input type="text" id="profile-fullname" required>
                </div>
                <div style="display: flex; gap: 15px;">
                    <div class="input-group" style="flex: 1;">
                        <label>Ngày sinh</label>
                        <input type="date" id="profile-dob" required>
                    </div>
                    <div class="input-group" style="flex: 1;">
                        <label>Lớp</label>
                        <input type="text" id="profile-class" required>
                    </div>
                </div>
                
                <div id="profile-message" class="error-text" style="text-align: center; margin-top: -10px; margin-bottom: 15px;"></div>
                
                <button type="submit" class="btn-primary">Cập nhật thông tin</button>
            </form>
        </div>
    </div>

    <div id="footer-placeholder"></div>

    <script src="js/common.js"></script>
    <script type="module" src="js/taikhoan.js"></script>
</body>
</html>
