<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang chủ - Điểm danh DH25PM</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="dashboard-bg-alt">
    <div id="navbar-placeholder" style="width: 100%;"></div>
    
    <div class="dashboard animate-fade-in-up">
        <header>
            <h2>Phần mêm Quản lý Sinh viên - Lớp DH25PM</h2>
            <div class="user-info">
                <span id="welcome-user">Đang tải...</span>
            </div>
        </header>

        <div class="main-content">
            <div class="stats-container">
                <div class="stat-box text-total">Tổng: <span id="stat-total">0</span></div>
                <div class="stat-box text-success">Có mặt: <span id="stat-present">0</span></div>
                <div class="stat-box text-danger">Vắng: <span id="stat-absent">0</span></div>
                <div class="stat-box text-warning">Chưa ĐD: <span id="stat-pending">0</span></div>
            </div>

            <div class="add-student-form">
                <input type="text" id="new-sv-id" placeholder="Nhập MSSV mới" required>
                <input type="text" id="new-sv-name" placeholder="Nhập Họ và Tên" required>
                <button id="btn-add-student" class="btn-success">
                    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 5v14m-7-7h14"></path></svg>
                    Thêm SV
                </button>
            </div>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>MSSV</th>
                            <th>Họ và Tên</th>
                            <th>Trạng thái</th>
                            <th>Thao tác</th>
                        </tr>
                    </thead>
                    <tbody id="student-list">
                        <tr><td colspan="4" style="text-align:center; padding: 30px; color: #7f8c8d;">Đang tải dữ liệu...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="footer-placeholder"></div>

    <script src="js/common.js"></script>
    <script type="module" src="js/index.js"></script>
</body>
</html>
