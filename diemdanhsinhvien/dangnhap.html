<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Hệ thống</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-bg">
    <div class="login-box animate-fade-in-up">
        <h2>Chào mừng trở lại</h2>
        <p>Vui lòng đăng nhập để vào hệ thống điểm danh</p>
        <form id="login-form">
            <div class="input-group">
                <label for="username">Tên đăng nhập (Email)</label>
                <input type="email" id="username" placeholder="Nhập email của bạn" required>
            </div>
            <div class="input-group">
                <label for="password">Mật khẩu</label>
                <input type="password" id="password" placeholder="Nhập mật khẩu" required>
            </div>
            
            <div id="error-message" class="error-text" style="text-align: center; margin-bottom: 15px; min-height: 20px;"></div>
            
            <div style="display: flex; justify-content: center;">
                <button type="submit" class="btn-primary" style="width: 200px; height: 45px; border-radius: 30px; display: flex; justify-content: center; align-items: center; margin: 0; padding: 0;">Đăng Nhập</button>
            </div>
            
            <p style="text-align: center; margin-top: 20px; margin-bottom: 0; color: #666; font-size: 14px;">
                Chưa có tài khoản? <a href="dangky.html" style="color: #3498db; font-weight: bold; text-decoration: none;">Đăng ký ngay</a>
            </p>
        </form>
    </div>
    <div class="footer-login-wrap animate-fade-in-up" style="animation-delay: 0.2s;">
        <div id="footer-placeholder"></div>
    </div>
    <script src="js/common.js"></script>
    <script type="module" src="js/dangnhap.js"></script>
</body>
</html>
